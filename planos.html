<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editor de Planos | OrdenLista</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">

<style>

body{
background:#f5f5f5;
font-family:Arial;
margin:0;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:240px;
background:white;
border-right:1px solid #ddd;
padding:15px;
overflow:auto;
}

.sidebar h3{
margin-top:20px;
font-size:14px;
color:#555;
}

.tool-item{
padding:8px;
border:1px solid #ddd;
border-radius:6px;
margin-bottom:6px;
cursor:pointer;
background:white;
font-size:13px;
}

.tool-item:hover{
background:#f0f0f0;
}

.workspace{
flex:1;
display:flex;
flex-direction:column;
}

.toolbar{
background:white;
border-bottom:1px solid #ddd;
padding:10px;
display:flex;
gap:10px;
align-items:center;
}

.canvas-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#eaeaea;
}

#container{
background:white;
border:2px solid #ccc;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Estructura</h3>

<div class="tool-item" draggable="true" data-shape="wall">Pared</div>
<div class="tool-item" draggable="true" data-shape="line">Línea</div>
<div class="tool-item" draggable="true" data-shape="column">Columna</div>
<div class="tool-item" draggable="true" data-shape="window">Ventana</div>
<div class="tool-item" draggable="true" data-shape="door">Puerta</div>

<h3>Formas</h3>

<div class="tool-item" draggable="true" data-shape="rectangle">Rectángulo</div>
<div class="tool-item" draggable="true" data-shape="circleShape">Círculo</div>
<div class="tool-item" draggable="true" data-shape="triangle">Triángulo</div>

<h3>Mobiliario</h3>

<div class="tool-item" draggable="true" data-shape="squareTable">Mesa</div>
<div class="tool-item" draggable="true" data-shape="chair">Silla</div>
<div class="tool-item" draggable="true" data-shape="sofa">Sofá</div>
<div class="tool-item" draggable="true" data-shape="bed">Cama</div>
<div class="tool-item" draggable="true" data-shape="desk">Escritorio</div>

<h3>Restaurante</h3>

<div class="tool-item" draggable="true" data-shape="dining">Mesa redonda</div>
<div class="tool-item" draggable="true" data-shape="booth">Booth</div>
<div class="tool-item" draggable="true" data-shape="barCounter">Barra</div>

<h3>Cocina</h3>

<div class="tool-item" draggable="true" data-shape="stove">Estufa</div>
<div class="tool-item" draggable="true" data-shape="sink">Lavabo</div>
<div class="tool-item" draggable="true" data-shape="fridge">Refrigerador</div>
<div class="tool-item" draggable="true" data-shape="pizzaOven">Horno Pizza</div>

<h3>Extras</h3>

<div class="tool-item" draggable="true" data-shape="plant">Planta</div>
<div class="tool-item" draggable="true" data-shape="stairs">Escaleras</div>
<div class="tool-item" draggable="true" data-shape="label">Texto</div>

</div>

<div class="workspace">

<div class="toolbar">

<button id="undo">↩️ Deshacer</button>

<button id="clear">🗑 Borrar</button>

<button id="drawMode">✏️ Lápiz</button>

<button onclick="guardarPlano()">💾 Guardar Plano</button>

<button id="saveImg">📸 Exportar Imagen</button>

<input type="color" id="colorPicker">

<button id="toFront">⬆️ Adelante</button>

<button id="toBack">⬇️ Atrás</button>

</div>

<div class="canvas-area">

<div id="container"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config-master.js"></script>

<script src="js/planos.js"></script>

</body>
</ht
